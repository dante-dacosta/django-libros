{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <title>{% block titulo %} {% endblock %}</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand navbar-dark bg-dark">
                <div class="nav navbar-nav">
                    <a class="nav-item nav-link active" href="{% url 'inicio' %}" aria-current="page"
                        >Inicio <span class="visually-hidden">(current)</span></a
                    >
                    <a class="nav-item nav-link" href="{% url 'libros' %}">Libros</a>
                    <a class="nav-item nav-link" href="{% url 'nosotros' %}">Nosotros</a>
                </div>
            </nav>
            
        </header>
        <main>
            </br>
            <div class="container">
                <div class="row">
                    <div class="col-12">
                        {% block contenido %}
                        {% endblock %}
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
