{% extends "base.html" %}

{% block titulo %} CRUD Libros {% endblock %}

{% block contenido %} 

    <div class="card">
        <div class="card-header">
            <span class="h3">Database Libros</span>
            <a
                name=""
                id=""
                class="btn btn-success item-center float-end"
                href="{% url 'crearLibro' %}"
                role="button"
                >Agregar nuevo libro</a
            >
        </div>
        <div class="card-body">
            <h5 class="card-title">Libros</h5>

            <div
                class="table-responsive"
            >
                <table
                    class="table table-primary"
                >
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Titulo</th>
                            <th scope="col">Imagen</th>
                            <th scope="col">Descripcion</th>
                            <th scope="col">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>

                        {% for libro in libros %}
                        <tr class="">
                            <td scope="row">{{libro.id}}</td>
                            <td>{{libro.titulo}}</td>
                            <td><img src="{{libro.imagen.url}}" alt="" srcset="" height="100" width="100"></td>
                            <td>{{libro.descripcion}}</td>
                            <td>
                                <a
                                    name=""
                                    id=""
                                    class="btn btn-info"
                                    href="{% url 'editarLibro' %}"
                                    role="button"
                                    >Editar</a
                                >
                                <a
                                    name=""
                                    id=""
                                    class="btn btn-danger"
                                    href="#"
                                    role="button"
                                    >Borrar</a
                                >
                                
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            
    </div>

{% endblock %}
